      - AWS Working Backwards: frameworks/aws.md
      - Google Design Docs: frameworks/google.md
      - Stripe API-First: frameworks/stripe.md
      - Lean Startup: frameworks/lean-startup.md
      - Design Thinking: frameworks/design-thinking.md
      - Jobs to be Done: frameworks/jtbd.md
  - CLI Reference:
      - Overview: cli/index.md
      - init: cli/init.md
      - create: cli/create.md
      - lint: cli/lint.md
      - eval: cli/eval.md
      - synthesize: cli/synthesize.md
      - reconcile: cli/reconcile.md
      - approve: cli/approve.md
      - export: cli/export.md
      - targets: cli/targets.md
      - status: cli/status.md
      - profiles: cli/profiles.md
      - graph: cli/graph.md
      - context: cli/context.md
      - docs: cli/docs.md
      - serve: cli/serve.md
  - Guides:
