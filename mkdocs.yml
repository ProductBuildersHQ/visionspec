site_name: VisionSpec
site_description: Multi-domain specification orchestration for humans and AI agents
site_url: https://productbuildershq.com/visionspec
repo_url: https://github.com/ProductBuildersHQ/visionspec
repo_name: ProductBuildersHQ/visionspec

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Light mode first (ProductBuildersHQ default)
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

# ProductBuildersHQ Theme Assets (served from main site)
extra_css:
  - https://productbuildershq.com/css/productbuildershq-mkdocs.css

extra_javascript:
  - https://productbuildershq.com/js/site-nav.min.js
  - https://productbuildershq.com/js/pbhq-nav.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Concepts: getting-started/concepts.md
  - Concepts:
      - Overview: concepts/index.md
      - Working Backwards: concepts/working-backwards.md
  - Frameworks:
