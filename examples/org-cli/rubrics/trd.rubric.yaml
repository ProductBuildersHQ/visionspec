id: trd-rubric
name: Acme TRD Rubric
version: "1.0"
description: Technical Requirements Document evaluation with Acme engineering standards
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 0
        medium: 2
        low: -1
categories:
    - id: architecture_clarity
      name: Architecture Clarity
      description: How clearly the system architecture is described
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear architecture with diagrams, component descriptions, and data flow
            - value: partial
              label: Partial
              criteria:
                - Basic architecture present but lacks detail
            - value: fail
              label: Fail
              criteria:
                - No clear architecture described
    - id: prd_traceability
      name: PRD Traceability
      description: Whether technical design traces back to PRD requirements
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Every PRD requirement has corresponding technical design
            - value: partial
              label: Partial
              criteria:
                - Some traceability but gaps exist
            - value: fail
              label: Fail
              criteria:
                - No traceability to requirements
    - id: api_design
      name: API Design
      description: Quality of API/interface definitions
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Complete API spec with request/response schemas and error handling
            - value: partial
              label: Partial
              criteria:
                - Basic API definition present
            - value: fail
              label: Fail
              criteria:
                - No API design
    - id: data_design
      name: Data Design
      description: Quality of data models and storage design
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Complete data models with relationships, storage rationale, and migration plan
            - value: partial
              label: Partial
              criteria:
                - Basic data design present
            - value: fail
              label: Fail
              criteria:
                - No data design
    - id: nfr_coverage
      name: NFR Coverage
      description: Coverage of non-functional requirements (performance, security, etc.)
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Comprehensive NFRs with specific targets and measurement plans
            - value: partial
              label: Partial
              criteria:
                - Some NFRs but gaps in coverage
            - value: fail
              label: Fail
              criteria:
                - No NFR coverage
    - id: implementability
      name: Implementability
      description: Whether the design is implementable by an engineer
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Design is actionable with clear path to implementation
            - value: partial
              label: Partial
              criteria:
                - Design needs some clarification before implementation
            - value: fail
              label: Fail
              criteria:
                - Cannot be implemented from this document
