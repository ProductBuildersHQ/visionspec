id: prd-rubric
name: Acme PRD Rubric
version: "1.0"
description: Product Requirements Document evaluation with Acme security requirements
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 0
        medium: 2
        low: -1
categories:
    - id: problem-clarity
      name: Problem Clarity
      description: Is the problem being solved clearly articulated?
      weight: 1.5
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Problem is specific, measurable, and tied to user needs
            - value: partial
              label: Partial
              criteria:
                - Problem is stated but lacks specificity or user grounding
            - value: fail
              label: Fail
              criteria:
                - Problem is unclear or missing
    - id: user-stories
      name: User Stories
      description: Are user stories complete with acceptance criteria?
      weight: 2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - All user stories follow format with testable acceptance criteria
            - value: partial
              label: Partial
              criteria:
                - Some user stories missing criteria or incomplete
            - value: fail
              label: Fail
              criteria:
                - User stories missing or not in proper format
    - id: requirements-coverage
      name: Requirements Coverage
      description: Are functional and non-functional requirements complete?
      weight: 2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Comprehensive FR and NFR with priorities and dependencies
            - value: partial
              label: Partial
              criteria:
                - Requirements present but missing priorities or dependencies
            - value: fail
              label: Fail
              criteria:
                - Requirements incomplete or poorly organized
    - id: security-requirements
      name: Security Requirements
      description: Are security requirements explicitly documented? (ACME POLICY)
      weight: 3
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Authentication, authorization, and data protection addressed
            - value: partial
              label: Partial
              criteria:
                - Some security considerations but gaps exist
            - value: fail
              label: Fail
              criteria:
                - Security requirements missing or inadequate
    - id: accessibility
      name: Accessibility
      description: Are accessibility requirements addressed? (WCAG 2.1 AA)
      weight: 1.5
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - WCAG 2.1 AA compliance explicitly addressed
            - value: partial
              label: Partial
              criteria:
                - Some accessibility mentioned but not comprehensive
            - value: fail
              label: Fail
              criteria:
                - Accessibility not addressed
