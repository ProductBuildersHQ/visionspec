id: uxd-rubric
name: Acme UXD Rubric
version: "1.0"
description: User Experience Design evaluation with Acme accessibility requirements
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 0
        medium: 2
        low: -1
categories:
    - id: design_goals
      name: Design Goals
      description: Clarity of UX objectives and design principles
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear, measurable UX goals aligned with product strategy and guiding principles
            - value: partial
              label: Partial
              criteria:
                - Goals present but could be more specific
            - value: fail
              label: Fail
              criteria:
                - Design goals missing
    - id: user_personas
      name: User Personas
      description: Quality and depth of user persona definitions
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Rich personas with goals, pain points, behaviors, and scenarios
            - value: partial
              label: Partial
              criteria:
                - Basic personas present but shallow
            - value: fail
              label: Fail
              criteria:
                - Personas missing or inadequate
    - id: user_journeys
      name: User Journeys
      description: Completeness of user journey mapping
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Complete journeys with entry/exit points, success criteria, and edge cases
            - value: partial
              label: Partial
              criteria:
                - Basic flows present but incomplete
            - value: fail
              label: Fail
              criteria:
                - User journeys missing
    - id: information_architecture
      name: Information Architecture
      description: Structure and organization of content
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear site map, navigation structure, and content hierarchy
            - value: partial
              label: Partial
              criteria:
                - Basic structure present
            - value: fail
              label: Fail
              criteria:
                - Information architecture missing
    - id: wireframes
      name: Wireframes and Layouts
      description: Quality and coverage of wireframes
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Comprehensive wireframes for all key screens with element descriptions
            - value: partial
              label: Partial
              criteria:
                - Some wireframes but incomplete coverage
            - value: fail
              label: Fail
              criteria:
                - Wireframes missing
    - id: interaction_design
      name: Interaction Design
      description: Definition of interaction patterns and behaviors
      weight: 0.1
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear interaction patterns, micro-interactions, and state transitions
            - value: partial
              label: Partial
              criteria:
                - Basic interactions present
            - value: fail
              label: Fail
              criteria:
                - Interaction design missing
    - id: accessibility
      name: Accessibility
      description: WCAG compliance and inclusive design considerations
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - WCAG compliance specified, comprehensive checklist, keyboard/screen reader considerations
            - value: partial
              label: Partial
              criteria:
                - Basic accessibility mentioned
            - value: fail
              label: Fail
              criteria:
                - Accessibility not addressed
    - id: error_states
      name: Error States and Edge Cases
      description: Handling of errors, empty states, and edge cases
      weight: 0.05
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Comprehensive error messages, empty states, loading states, and recovery actions
            - value: partial
              label: Partial
              criteria:
                - Some error states defined
            - value: fail
              label: Fail
              criteria:
                - Error states not addressed
