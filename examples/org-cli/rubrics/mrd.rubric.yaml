id: mrd-rubric
name: Acme MRD Rubric
version: "1.0"
description: Market Requirements Document evaluation with Acme business requirements
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 0
        medium: 2
        low: -1
categories:
    - id: problem_statement
      name: Problem Statement
      description: Clarity and relevance of the market problem being addressed
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Problem is clearly articulated with quantified impact, timing justification, and cost of inaction
            - value: partial
              label: Partial
              criteria:
                - Problem is stated but lacks depth or supporting evidence
            - value: fail
              label: Fail
              criteria:
                - Problem statement is missing or unclear
    - id: target_market
      name: Target Market
      description: Definition and sizing of target market segments
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear TAM/SAM/SOM with detailed segment profiles and sizing methodology
            - value: partial
              label: Partial
              criteria:
                - Basic market definition present but incomplete
            - value: fail
              label: Fail
              criteria:
                - Market definition missing or completely inadequate
    - id: competitive_analysis
      name: Competitive Analysis
      description: Understanding of competitive landscape and differentiation
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Comprehensive analysis of direct/indirect competitors with clear differentiation strategy
            - value: partial
              label: Partial
              criteria:
                - Basic competitor list but limited analysis
            - value: fail
              label: Fail
              criteria:
                - Competitive analysis missing
    - id: requirements_clarity
      name: Requirements Clarity
      description: Clarity and prioritization of market requirements
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Requirements are prioritized (MoSCoW), traceable, and well-rationalized
            - value: partial
              label: Partial
              criteria:
                - Requirements listed but prioritization is weak
            - value: fail
              label: Fail
              criteria:
                - Requirements section is inadequate
    - id: business_alignment
      name: Business Alignment
      description: Alignment with business goals and measurable success metrics
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear strategic alignment with quantified success metrics and timelines
            - value: partial
              label: Partial
              criteria:
                - Business alignment stated but metrics are weak
            - value: fail
              label: Fail
              criteria:
                - No clear business alignment
    - id: risk_assessment
      name: Risk Assessment
      description: Identification of constraints, assumptions, and risks
      weight: 0.1
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Comprehensive risk matrix with impact, probability, and mitigation strategies
            - value: partial
              label: Partial
              criteria:
                - Risks listed but mitigation is incomplete
            - value: fail
              label: Fail
              criteria:
                - Risk assessment missing
