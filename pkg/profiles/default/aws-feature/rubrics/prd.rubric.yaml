id: prd-rubric
name: AWS PRD Evaluation
version: "1.0"
description: Evaluates Product Requirements Documents with Amazon Leadership Principles emphasis on decision analysis and customer focus
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 0
        medium: 0
        low: -1
categories:
    - id: customer_obsession
      name: Customer Obsession
      description: Whether requirements clearly trace back to validated customer needs
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Every requirement traces to a specific customer need; customer voice evident throughout
            - value: partial
              label: Partial
              criteria:
                - Requirements exist but customer connection is weak
            - value: fail
              label: Fail
              criteria:
                - Requirements feel internally driven, not customer-driven
    - id: problem_definition
      name: Problem Definition
      description: Clarity of the problem statement from user perspective
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Problem is specific, measurable, and clearly impacts users; worked backwards from customer
            - value: partial
              label: Partial
              criteria:
                - Problem exists but lacks specificity or customer grounding
            - value: fail
              label: Fail
              criteria:
                - No clear problem statement
    - id: decision_reversibility
      name: Decision Reversibility
      description: Whether decisions are analyzed as one-way or two-way doors
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear identification of one-way vs two-way door decisions; appropriate deliberation for each
            - value: partial
              label: Partial
              criteria:
                - Some decision analysis but reversibility not consistently considered
            - value: fail
              label: Fail
              criteria:
                - No reversibility analysis; all decisions treated the same
    - id: goals_scope
      name: Goals and Scope
      description: Clarity of goals and explicit non-goals
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Goals are SMART, non-goals explicitly stated, scope is bounded; think big but focused
            - value: partial
              label: Partial
              criteria:
                - Goals present but scope could be clearer
            - value: fail
              label: Fail
              criteria:
                - Goals and scope missing
    - id: user_stories
      name: User Stories
      description: Quality and completeness of user stories
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - All stories follow standard format, are prioritized, with clear acceptance criteria
            - value: partial
              label: Partial
              criteria:
                - Stories exist but some lack acceptance criteria
            - value: fail
              label: Fail
              criteria:
                - User stories missing or inadequate
    - id: functional_requirements
      name: Functional Requirements
      description: Completeness and testability of functional requirements
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Requirements are complete, traceable to stories, and testable; highest standards
            - value: partial
              label: Partial
              criteria:
                - Requirements exist but some are vague
            - value: fail
              label: Fail
              criteria:
                - Functional requirements missing
    - id: simplifying_assumptions
      name: Simplifying Assumptions
      description: Whether key simplifying assumptions are identified
      weight: 0.05
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear simplifying assumptions that reduce complexity and enable faster delivery
            - value: partial
              label: Partial
              criteria:
                - Some simplification mentioned
            - value: fail
              label: Fail
              criteria:
                - No simplifying assumptions; solution feels overengineered
    - id: frugality
      name: Frugality
      description: Whether requirements demonstrate accomplish more with less mindset
      weight: 0.05
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Requirements focused on essential value; no gold-plating; constraints acknowledged
            - value: partial
              label: Partial
              criteria:
                - Some nice-to-haves but mostly focused
            - value: fail
              label: Fail
              criteria:
                - Kitchen sink approach; no prioritization
    - id: success_metrics
      name: Success Metrics
      description: Definition of measurable success criteria focusing on inputs
      weight: 0.05
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - SMART metrics with baselines, targets; focus on inputs we control, not just outputs
            - value: partial
              label: Partial
              criteria:
                - Some metrics but lacking specificity or too output-focused
            - value: fail
              label: Fail
              criteria:
                - Success metrics missing
    - id: dependencies
      name: Dependencies and Risks
      description: Identification of dependencies and open questions
      weight: 0.05
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Dependencies mapped with owners, status, and risk mitigation; vocally self-critical
            - value: partial
              label: Partial
              criteria:
                - Some dependencies noted
            - value: fail
              label: Fail
              criteria:
                - Dependencies not addressed
