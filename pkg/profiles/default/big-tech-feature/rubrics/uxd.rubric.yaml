# Big Tech Feature UXD Evaluation Rubric

spec_type: uxd
name: "Big Tech Feature UXD Rubric"
description: "User Experience Design evaluation for feature-level implementations"
version: "1.0"

categories:
  - id: user_understanding
    name: "User Understanding"
    description: "Clear understanding of target users and their needs"
    weight: 0.20
    required: true
    criteria:
      pass: "Target users identified with key insights from research"
      partial: "Users mentioned but insights thin"
      fail: "No user understanding demonstrated"

  - id: user_journey
    name: "User Journey"
    description: "Current and future state user journeys"
    weight: 0.15
    required: true
    criteria:
      pass: "Clear current vs future state with pain points addressed"
      partial: "Journey described but gaps in reasoning"
      fail: "No user journey"

  - id: information_architecture
    name: "Information Architecture"
    description: "Feature location and navigation"
    weight: 0.10
    required: true
    criteria:
      pass: "Clear placement in product with navigation flow"
      partial: "Location mentioned but navigation unclear"
      fail: "No IA consideration"

  - id: wireframes
    name: "Wireframes"
    description: "Visual representations of screens"
    weight: 0.20
    required: true
    criteria:
      pass: "Wireframes for all key screens with interactions noted"
      partial: "Some wireframes but incomplete coverage"
      fail: "No wireframes"

  - id: interaction_design
    name: "Interaction Design"
    description: "Interactions, errors, and loading states"
    weight: 0.15
    required: true
    criteria:
      pass: "All interactions, error states, and loading states defined"
      partial: "Happy path interactions only"
      fail: "No interaction design"

  - id: content
    name: "Content"
    description: "Copy and microcopy defined"
    weight: 0.10
    required: true
    criteria:
      pass: "All UI copy defined with voice/tone guidance"
      partial: "Some copy defined"
      fail: "No content design"

  - id: accessibility
    name: "Accessibility"
    description: "Accessibility considerations"
    weight: 0.10
    required: true
    criteria:
      pass: "WCAG compliance with specific considerations noted"
      partial: "Basic accessibility mentioned"
      fail: "No accessibility consideration"

pass_criteria:
  require_all_pass: false
  max_critical: 0
  max_high: 1
  max_medium: 2
