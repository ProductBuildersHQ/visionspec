# Big Tech Feature IRD Evaluation Rubric

spec_type: ird
name: "Big Tech Feature IRD Rubric"
description: "Infrastructure Requirements Document evaluation for feature-level implementations"
version: "1.0"

categories:
  - id: change_scope
    name: "Change Scope"
    description: "Clear identification of infrastructure changes"
    weight: 0.25
    required: true
    criteria:
      pass: "New, modified, and unchanged resources clearly identified"
      partial: "Some changes listed but incomplete"
      fail: "Scope of changes unclear"

  - id: trd_alignment
    name: "TRD Alignment"
    description: "Infrastructure supports technical requirements"
    weight: 0.20
    required: true
    criteria:
      pass: "Infrastructure changes directly support TRD architecture"
      partial: "Some alignment but gaps exist"
      fail: "Infrastructure doesn't support requirements"

  - id: scaling_impact
    name: "Scaling Impact"
    description: "Load impact and scaling considerations"
    weight: 0.15
    required: true
    criteria:
      pass: "Expected load quantified with scaling approach"
      partial: "Load mentioned but scaling unclear"
      fail: "No scaling considerations"

  - id: security
    name: "Security"
    description: "Security changes for the feature"
    weight: 0.15
    required: true
    criteria:
      pass: "Network, access, and data security changes documented"
      partial: "Some security considerations"
      fail: "Security not addressed"

  - id: monitoring
    name: "Monitoring"
    description: "New metrics and alerts for the feature"
    weight: 0.10
    required: true
    criteria:
      pass: "New metrics, dashboards, and alerts defined"
      partial: "Basic monitoring mentioned"
      fail: "No monitoring changes"

  - id: cost_impact
    name: "Cost Impact"
    description: "Cost estimation for changes"
    weight: 0.10
    required: false
    criteria:
      pass: "Cost impact estimated with optimization notes"
      partial: "Basic cost estimate"
      fail: "No cost analysis"

  - id: rollback
    name: "Rollback Plan"
    description: "Infrastructure rollback approach"
    weight: 0.05
    required: true
    criteria:
      pass: "Clear rollback plan for infrastructure changes"
      partial: "Rollback mentioned"
      fail: "No rollback plan"

pass_criteria:
  require_all_pass: false
  max_critical: 0
  max_high: 1
  max_medium: 2
