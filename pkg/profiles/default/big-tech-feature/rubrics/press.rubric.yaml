id: press-rubric
name: AWS Press Release Evaluation
version: "1.0"
description: Evaluates Press Release documents using Amazon Working Backwards methodology and Leadership Principles
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 0
        medium: 0
        low: -1
categories:
    - id: working_backwards_fidelity
      name: Working Backwards Fidelity
      description: Whether the document genuinely works backwards from customer needs, not forwards from a solution
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Authentic customer perspective; problem clearly existed before solution was conceived; customer voice feels real
            - value: partial
              label: Partial
              criteria:
                - Customer framing present but feels retrofitted to justify a predetermined solution
            - value: fail
              label: Fail
              criteria:
                - Solution-first thinking disguised as customer-first; problem statement invented to justify solution
    - id: headline_impact
      name: Headline Impact
      description: Whether the headline clearly communicates the primary customer benefit
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Compelling headline with clear customer benefit; would make a customer want to read more
            - value: partial
              label: Partial
              criteria:
                - Headline present but benefit unclear or generic
            - value: fail
              label: Fail
              criteria:
                - No clear headline or focuses on company/technology rather than customer benefit
    - id: customer_problem
      name: Customer Problem
      description: How well the customer problem is articulated with authentic voice
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Vivid problem description with authentic customer quotes; reader can feel the pain
            - value: partial
              label: Partial
              criteria:
                - Problem stated but lacks specificity or authentic customer voice
            - value: fail
              label: Fail
              criteria:
                - No clear customer problem or problem feels manufactured
    - id: solution_clarity
      name: Solution Clarity
      description: Whether the solution and benefits are clearly explained in customer terms
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Crystal clear solution with concrete, measurable benefits stated in customer terms
            - value: partial
              label: Partial
              criteria:
                - Solution described but benefits vague or too technical
            - value: fail
              label: Fail
              criteria:
                - No clear solution articulated or drowns in jargon
    - id: customer_validation
      name: Customer Validation
      description: Quality of customer quotes and validation
      weight: 0.1
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Authentic customer quotes with specific success stories that feel real
            - value: partial
              label: Partial
              criteria:
                - Generic quotes without specificity; could apply to any product
            - value: fail
              label: Fail
              criteria:
                - No customer validation or quotes are obviously fabricated
    - id: simplifying_assumption
      name: Simplifying Assumption
      description: Whether the document identifies the key insight that makes this achievable
      weight: 0.1
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear simplifying assumption identified that unlocks the solution
            - value: partial
              label: Partial
              criteria:
                - Some simplification mentioned but not a breakthrough insight
            - value: fail
              label: Fail
              criteria:
                - No simplifying assumption; solution seems overly complex
    - id: call_to_action
      name: Call to Action
      description: Clarity of availability, pricing, and next steps
      weight: 0.05
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear availability, pricing, and specific action steps; bias for action
            - value: partial
              label: Partial
              criteria:
                - CTA present but vague
            - value: fail
              label: Fail
              criteria:
                - No call to action
    - id: readability
      name: Readability
      description: Whether the press release is written in plain, accessible language
      weight: 0.05
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear, jargon-free prose accessible to general audience
            - value: partial
              label: Partial
              criteria:
                - Somewhat technical but understandable
            - value: fail
              label: Fail
              criteria:
                - Incomprehensible to target audience
