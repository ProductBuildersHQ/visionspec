# Enterprise BMC Evaluation Rubric

spec_type: bmc
name: "Enterprise BMC Rubric"
description: "Business Model Canvas evaluation based on Osterwalder's framework"
version: "1.0"

categories:
  - id: customer_segments
    name: "Customer Segments"
    description: "Clarity and specificity of target customer segments"
    weight: 0.12
    required: true
    criteria:
      pass: "Segments clearly defined with size, needs, and pain points; personas identified"
      partial: "Segments defined but lack detail on needs or size"
      fail: "Customer segments not defined or too vague"

  - id: value_propositions
    name: "Value Propositions"
    description: "Strength of value proposition for each segment"
    weight: 0.15
    required: true
    criteria:
      pass: "Clear pain relievers and gain creators mapped to specific segments with differentiation"
      partial: "Value proposition stated but weak connection to customer pains/gains"
      fail: "No clear value proposition or generic claims"

  - id: channels
    name: "Channels"
    description: "Completeness of channel strategy across customer journey"
    weight: 0.10
    required: true
    criteria:
      pass: "All 5 phases covered (awareness, evaluation, purchase, delivery, after-sales) with specific channels"
      partial: "Some phases covered but gaps in customer journey"
      fail: "Channel strategy missing or incomplete"

  - id: customer_relationships
    name: "Customer Relationships"
    description: "Appropriate relationship types for each segment"
    weight: 0.08
    required: true
    criteria:
      pass: "Relationship types matched to segment expectations with clear rationale"
      partial: "Relationships defined but not matched to segments"
      fail: "Customer relationships not considered"

  - id: revenue_streams
    name: "Revenue Streams"
    description: "Viability and clarity of revenue model"
    weight: 0.15
    required: true
    criteria:
      pass: "Revenue types, pricing mechanisms, and projections clearly defined with segment mapping"
      partial: "Revenue model stated but pricing or projections unclear"
      fail: "No revenue model or unrealistic assumptions"

  - id: key_resources
    name: "Key Resources"
    description: "Identification of critical resources required"
    weight: 0.10
    required: true
    criteria:
      pass: "All resource types considered (physical, intellectual, human, financial) with criticality assessed"
      partial: "Some resources identified but gaps in coverage"
      fail: "Key resources not identified"

  - id: key_activities
    name: "Key Activities"
    description: "Core activities required to deliver value proposition"
    weight: 0.10
    required: true
    criteria:
      pass: "Activities clearly linked to value proposition delivery with resource mapping"
      partial: "Activities listed but not connected to value delivery"
      fail: "Key activities not identified"

  - id: key_partnerships
    name: "Key Partnerships"
    description: "Strategic partnerships and their motivations"
    weight: 0.08
    required: true
    criteria:
      pass: "Partners identified with clear motivations and mutual value exchange"
      partial: "Partners listed but motivation unclear"
      fail: "No partnership strategy"

  - id: cost_structure
    name: "Cost Structure"
    description: "Understanding of cost drivers and economics"
    weight: 0.12
    required: true
    criteria:
      pass: "Fixed/variable costs identified, cost drivers clear, estimates provided"
      partial: "Some costs identified but incomplete analysis"
      fail: "Cost structure not analyzed"

pass_criteria:
  require_all_pass: false
  max_critical: 0
  max_high: 1
  max_medium: 2
