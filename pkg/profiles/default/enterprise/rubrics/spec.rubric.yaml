id: spec-rubric
name: Enterprise Unified Spec Rubric
version: "1.0"
description: Unified specification document evaluation for enterprise execution readiness
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 0
        medium: 1
        low: -1
categories:
    - id: source_completeness
      name: Source Document Completeness
      description: Whether all source documents are referenced and approved
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - All required documents (MRD, PRD, UXD, TRD, TPD, IRD) referenced with approval status
            - value: partial
              label: Partial
              criteria:
                - Most documents referenced but some missing or unapproved
            - value: fail
              label: Fail
              criteria:
                - Missing critical source documents
    - id: consistency
      name: Cross-Document Consistency
      description: Whether information is consistent across all source documents
      weight: 0.18
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - No contradictions between source documents, unified narrative
            - value: partial
              label: Partial
              criteria:
                - Minor inconsistencies that don't affect execution
            - value: fail
              label: Fail
              criteria:
                - Significant contradictions between documents
    - id: traceability
      name: Requirements Traceability
      description: Ability to trace from business need to implementation
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear traceability from MRD → PRD → TRD → TPD with IDs
            - value: partial
              label: Partial
              criteria:
                - Some traceability but gaps exist
            - value: fail
              label: Fail
              criteria:
                - Cannot trace requirements through documents
    - id: execution_readiness
      name: Execution Readiness
      description: Whether document provides enough detail to begin implementation
      weight: 0.18
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Team can begin work immediately with no ambiguity
            - value: partial
              label: Partial
              criteria:
                - Some clarifications needed but work can start
            - value: fail
              label: Fail
              criteria:
                - Too many open questions to begin work
    - id: launch_plan
      name: Launch Plan Quality
      description: Completeness of timeline, milestones, and launch checklist
      weight: 0.12
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear timeline with milestones, dependencies, and comprehensive checklist
            - value: partial
              label: Partial
              criteria:
                - Basic timeline but missing checklist items
            - value: fail
              label: Fail
              criteria:
                - No launch plan
    - id: risk_coverage
      name: Risk Coverage
      description: Aggregation and prioritization of risks across all documents
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - All risks aggregated with owners and mitigations assigned
            - value: partial
              label: Partial
              criteria:
                - Risks listed but not prioritized or assigned
            - value: fail
              label: Fail
              criteria:
                - Risks not consolidated
    - id: stakeholder_alignment
      name: Stakeholder Alignment
      description: Evidence of stakeholder review and approval
      weight: 0.12
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - All required approvals obtained with signatures/dates
            - value: partial
              label: Partial
              criteria:
                - Some approvals but missing key stakeholders
            - value: fail
              label: Fail
              criteria:
                - No stakeholder sign-off
