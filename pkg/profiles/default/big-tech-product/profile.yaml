name: big-tech-product
description: "Big Tech best practices for new product lines. Starts with MRD + OKRs, uses PR/FAQ-driven development with design docs, API-first thinking, and autonomous team practices."
extends: big-tech

# Product-level workflow: MRD is the starting document
spec_config:
  # Discovery phase - MRD with OKRs (Amazon + Google)
  mrd:
    required: true
    category: source
    description: "Market requirements with OKR alignment - the starting document for new products"

  # OpportunitySpec not required for product-level (use big-tech-feature instead)
  opportunity-spec:
    required: false
    category: source

  # Vision phase - PR/FAQ (Amazon)
  press:
    required: true
    category: gtm
    description: "Working backwards press release"

  faq:
    required: true
    category: gtm
    description: "Challenge assumptions, include developer FAQ"

  # Narratives (Amazon)
  narrative-6p:
    required: true
    category: gtm
    description: "Amazon-style 6-pager for stakeholder alignment"

  narrative-1p:
    required: false
    category: gtm
    description: "Executive summary"

  # Requirements phase - PRD with API contracts (Google + Stripe)
  prd:
    required: true
    category: source
    description: "Product requirements with API contracts, non-goals, and alternatives"

  # Experience phase - UXD with DX (Stripe + Microsoft)
  uxd:
    required: true
    category: source
    description: "User experience with developer experience and accessibility"

  # Technical phase - Design docs (Google)
  trd:
    required: true
    category: technical
    description: "Design doc with alternatives, tradeoffs, and reversibility assessment"

  tpd:
    required: true
    category: technical
    description: "Test plan with experiment design and hypothesis validation"

  ird:
    required: true
    category: technical
    description: "Infrastructure design - deployment, scaling, operations, and cloud architecture"

  # Business Model Canvas: synthesized from MRD
  bmc:
    required: false
    category: gtm
    description: "Business Model Canvas extracted from MRD for stakeholder review"

# Synthesis rules for product-level flow
synthesis:
  bmc:
    sources:
      - mrd
    guidance: "Extract Business Model Canvas blocks from MRD. Include customer segments, value propositions, channels, relationships, revenue streams, resources, activities, partnerships, and costs."

  press:
    sources:
      - mrd
    guidance: "Write from customer perspective. Include measurable outcomes (OKRs). Frame as a bet with explicit risk (Spotify)."

  faq:
    sources:
      - mrd
      - press
    guidance: "Include internal stakeholder questions, customer questions, and developer/API questions (Stripe). Challenge assumptions ruthlessly."

  narrative-6p:
    sources:
      - mrd
      - press
      - faq
    guidance: "Amazon 6-pager format. Include data and explicit tradeoffs (Google). No slides, pure narrative."

  prd:
    sources:
      - mrd
      - press
      - faq
    guidance: "Include API contracts (Stripe), non-goals (Google), alternatives considered (Google), and success metrics (OKRs)."

  trd:
    sources:
      - prd
      - uxd
    guidance: "Google design doc format. Include alternatives considered, explicit tradeoffs, reversibility assessment (two-way vs one-way door), and scalability (10x thinking)."

  ird:
    sources:
      - trd
      - prd
    guidance: "Infrastructure design covering deployment architecture, scaling strategy, cloud services, monitoring, security, and operational runbooks. Include cost estimates and capacity planning."

  tpd:
    sources:
      - prd
      - trd
      - ird
    guidance: "Include experiment design with hypothesis and success criteria (Google/Spotify). Define what 'fail fast' looks like. Cover infrastructure testing requirements."
