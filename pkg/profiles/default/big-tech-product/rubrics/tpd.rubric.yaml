id: tpd-rubric
name: AWS TPD Rubric
version: "1.0"
description: Test Plan Document evaluation for AWS Working Backwards methodology
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 0
        medium: 2
        low: -1
categories:
    - id: customer_experience_validation
      name: Customer Experience Validation
      description: Tests validate the customer experience promised in Press Release
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Test scenarios directly map to Press Release customer promises
            - value: partial
              label: Partial
              criteria:
                - Some customer experience testing but gaps in coverage
            - value: fail
              label: Fail
              criteria:
                - No connection to customer experience validation
    - id: working_backwards_traceability
      name: Working Backwards Traceability
      description: Tests trace back through FAQ, PRD to original vision
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear traceability from tests through PRD/FAQ to Press Release
            - value: partial
              label: Partial
              criteria:
                - Some traceability but missing intermediate links
            - value: fail
              label: Fail
              criteria:
                - No working backwards traceability
    - id: decision_reversibility
      name: Decision Reversibility Testing
      description: Tests consider reversibility of technical decisions
      weight: 0.12
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Tests include rollback scenarios and feature flag validation
            - value: partial
              label: Partial
              criteria:
                - Basic rollback testing but incomplete
            - value: fail
              label: Fail
              criteria:
                - No reversibility testing
    - id: bar_raiser_readiness
      name: Bar Raiser Readiness
      description: Test plan would pass bar raiser review
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Comprehensive plan demonstrating ownership and customer obsession
            - value: partial
              label: Partial
              criteria:
                - Good plan but missing depth in some areas
            - value: fail
              label: Fail
              criteria:
                - Would not pass bar raiser review
    - id: operational_excellence
      name: Operational Excellence Testing
      description: Tests support operational excellence principles
      weight: 0.13
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Includes chaos testing, runbook validation, and observability testing
            - value: partial
              label: Partial
              criteria:
                - Basic operational testing but gaps exist
            - value: fail
              label: Fail
              criteria:
                - No operational excellence testing
    - id: automation_first
      name: Automation First
      description: Test automation is prioritized appropriately
      weight: 0.13
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear automation strategy with pipeline integration and coverage targets
            - value: partial
              label: Partial
              criteria:
                - Some automation but manual-heavy plan
            - value: fail
              label: Fail
              criteria:
                - No automation strategy
    - id: frugality
      name: Frugality
      description: Test plan is efficient without unnecessary complexity
      weight: 0.12
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Lean test plan focused on high-value testing
            - value: partial
              label: Partial
              criteria:
                - Some unnecessary complexity
            - value: fail
              label: Fail
              criteria:
                - Over-engineered or wasteful approach
