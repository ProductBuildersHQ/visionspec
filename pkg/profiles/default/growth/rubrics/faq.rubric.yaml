id: faq-rubric
name: Growth FAQ Rubric
version: "1.0"
description: FAQ evaluation for growth-phase products scaling customer support
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 1
        medium: 2
        low: -1
categories:
    - id: question_coverage
      name: Question Coverage
      description: Whether the FAQ anticipates the questions customers will actually ask
      weight: 0.25
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Comprehensive coverage of likely questions across all topics
            - value: partial
              label: Partial
              criteria:
                - Basic questions covered but gaps exist
            - value: fail
              label: Fail
              criteria:
                - Inadequate question coverage
    - id: answer_clarity
      name: Answer Clarity
      description: How clearly and directly questions are answered
      weight: 0.25
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Direct, clear answers with no ambiguity
            - value: partial
              label: Partial
              criteria:
                - Answers present but could be clearer
            - value: fail
              label: Fail
              criteria:
                - Answers don't address questions
    - id: customer_language
      name: Customer Language
      description: Whether questions and answers use customer language, not internal jargon
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Questions phrased as customers would ask, answers in plain language
            - value: partial
              label: Partial
              criteria:
                - Some jargon but generally accessible
            - value: fail
              label: Fail
              criteria:
                - Written for internal audience, not customers
    - id: pricing_transparency
      name: Pricing Transparency
      description: Clarity of pricing and cost-related information
      weight: 0.15
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear pricing with examples and cost estimation guidance
            - value: partial
              label: Partial
              criteria:
                - Basic pricing present but lacks detail
            - value: fail
              label: Fail
              criteria:
                - No pricing information
    - id: getting_started
      name: Getting Started Clarity
      description: How well the path to adoption is explained
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear step-by-step path from interest to success
            - value: partial
              label: Partial
              criteria:
                - Basic getting started info present
            - value: fail
              label: Fail
              criteria:
                - No getting started guidance
    - id: objection_handling
      name: Objection Handling
      description: Whether the FAQ addresses likely concerns and objections
      weight: 0.05
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Proactively addresses concerns with honest, confident responses
            - value: partial
              label: Partial
              criteria:
                - Some objections covered
            - value: fail
              label: Fail
              criteria:
                - No objection handling
