id: prd-rubric
name: Google RFC Evaluation
version: "1.0"
description: Evaluates RFC documents for peer review readiness, clarity, and stakeholder engagement
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 0
        medium: 0
        low: -1
categories:
    - id: problem_clarity
      name: Problem Clarity
      description: Whether the problem and motivation are clearly articulated
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Problem clearly stated with user and business impact; compelling case for action
            - value: partial
              label: Partial
              criteria:
                - Problem described but impact unclear
            - value: fail
              label: Fail
              criteria:
                - No clear problem; solution looking for problem
    - id: goals_nongoals
      name: Goals and Non-Goals
      description: Whether scope is well-bounded with explicit exclusions
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Goals specific and measurable; non-goals explicit with rationale
            - value: partial
              label: Partial
              criteria:
                - Goals present but non-goals weak
            - value: fail
              label: Fail
              criteria:
                - Scope unbounded; unclear what success looks like
    - id: alternatives_tradeoffs
      name: Alternatives and Tradeoffs
      description: Whether alternatives were considered and tradeoffs acknowledged
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Multiple alternatives with honest analysis; tradeoffs explicit
            - value: partial
              label: Partial
              criteria:
                - Some alternatives but analysis superficial
            - value: fail
              label: Fail
              criteria:
                - No alternatives; proposal presented as only option
    - id: peer_review_setup
      name: Peer Review Setup
      description: Whether the RFC is structured for effective review
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear reviewers listed; specific feedback requested; comment period defined
            - value: partial
              label: Partial
              criteria:
                - Some review structure but gaps
            - value: fail
              label: Fail
              criteria:
                - Not set up for review; would be approved rubber-stamp style
    - id: risk_assessment
      name: Risk Assessment
      description: Whether risks and dependencies are identified
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Risks identified with likelihood, impact, and mitigation; dependencies mapped
            - value: partial
              label: Partial
              criteria:
                - Some risks noted but not systematic
            - value: fail
              label: Fail
              criteria:
                - Risks not considered
    - id: success_metrics
      name: Success Metrics
      description: Whether success is measurable
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear metrics with baselines, targets, and measurement methods
            - value: partial
              label: Partial
              criteria:
                - Some metrics but not all measurable
            - value: fail
              label: Fail
              criteria:
                - No success metrics; would be unable to evaluate
    - id: launch_plan
      name: Launch Plan
      description: Whether rollout is planned with rollback capability
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Phased rollout with criteria; rollback plan defined
            - value: partial
              label: Partial
              criteria:
                - Some launch thinking but incomplete
            - value: fail
              label: Fail
              criteria:
                - No launch plan; would be big-bang
    - id: open_questions
      name: Open Questions
      description: Whether unknowns are surfaced for discussion
      weight: 0.05
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Open questions listed with proposed answers to seed discussion
            - value: partial
              label: Partial
              criteria:
                - Some questions noted
            - value: fail
              label: Fail
              criteria:
                - No questions; appears to have all answers already
