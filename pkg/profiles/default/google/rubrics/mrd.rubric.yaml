id: mrd-rubric
name: Google OKR Evaluation
version: "1.0"
description: Evaluates OKR documents for ambition, measurability, and alignment
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 0
        medium: 0
        low: -1
categories:
    - id: objective_quality
      name: Objective Quality
      description: Whether objectives are inspiring and appropriately ambitious
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Objectives are qualitative, inspiring, ambitious (70% achievement = success); time-bound
            - value: partial
              label: Partial
              criteria:
                - Objectives exist but feel like tasks or are too conservative
            - value: fail
              label: Fail
              criteria:
                - No clear objectives or objectives are just metrics
    - id: key_result_measurability
      name: Key Result Measurability
      description: Whether key results are specific and measurable
      weight: 0.25
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - KRs are specific, measurable with baselines, targets, and measurement methods
            - value: partial
              label: Partial
              criteria:
                - KRs exist but some are vague or unmeasurable
            - value: fail
              label: Fail
              criteria:
                - KRs are not measurable; would be unable to score
    - id: strategic_alignment
      name: Strategic Alignment
      description: Whether OKRs connect to higher-level strategy
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear connection to company/team mission; strategic rationale for each objective
            - value: partial
              label: Partial
              criteria:
                - Some alignment but not explicit
            - value: fail
              label: Fail
              criteria:
                - OKRs disconnected from strategy
    - id: ambition_level
      name: Ambition Level
      description: Whether OKRs are appropriately ambitious (not sandbagged)
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Stretch targets included; commitments vs aspirations distinguished; failure is acceptable
            - value: partial
              label: Partial
              criteria:
                - Some ambition but mostly conservative
            - value: fail
              label: Fail
              criteria:
                - Sandbagged; 100% achievement would be expected
    - id: resource_alignment
      name: Resource Alignment
      description: Whether resources are allocated to support OKRs
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Team allocation mapped to objectives; cross-functional needs identified
            - value: partial
              label: Partial
              criteria:
                - Some resource thinking but not systematic
            - value: fail
              label: Fail
              criteria:
                - No resource alignment; OKRs disconnected from capacity
    - id: dependencies_risks
      name: Dependencies and Risks
      description: Whether dependencies and risks are identified
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Dependencies mapped with fallbacks; key risks identified
            - value: partial
              label: Partial
              criteria:
                - Some dependencies noted
            - value: fail
              label: Fail
              criteria:
                - Dependencies not considered
    - id: check_in_structure
      name: Check-In Structure
      description: Whether there's a plan to track and update OKRs
      weight: 0.05
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear cadence for check-ins; scoring methodology defined
            - value: partial
              label: Partial
              criteria:
                - Some tracking planned
            - value: fail
              label: Fail
              criteria:
                - Set and forget; no tracking plan
