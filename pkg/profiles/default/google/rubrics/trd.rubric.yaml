id: trd-rubric
name: Google Design Doc Evaluation
version: "1.0"
description: Evaluates Design Docs for technical rigor, explicit tradeoffs, and alternatives analysis
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 0
        medium: 0
        low: -1
categories:
    - id: goals_nongoals
      name: Goals and Non-Goals
      description: Whether goals are specific and non-goals explicitly bound scope
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Goals are specific and measurable; non-goals explicitly stated with rationale
            - value: partial
              label: Partial
              criteria:
                - Goals present but non-goals weak or missing
            - value: fail
              label: Fail
              criteria:
                - No clear goals or scope is unbounded
    - id: alternatives_analysis
      name: Alternatives Analysis
      description: Whether multiple approaches were genuinely considered
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Multiple alternatives with honest pros/cons; clear rationale for rejection; 'do nothing' considered
            - value: partial
              label: Partial
              criteria:
                - Alternatives listed but analysis superficial or feels post-hoc
            - value: fail
              label: Fail
              criteria:
                - No alternatives; design presented as only option
    - id: tradeoffs_explicit
      name: Explicit Tradeoffs
      description: Whether tradeoffs are acknowledged and justified
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Key tradeoffs explicitly stated with what we gain, what we give up, and why acceptable
            - value: partial
              label: Partial
              criteria:
                - Some tradeoffs mentioned but not systematic
            - value: fail
              label: Fail
              criteria:
                - No tradeoffs acknowledged; design presented as having no costs
    - id: technical_depth
      name: Technical Depth
      description: Whether design is detailed enough for implementation
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Detailed design with interfaces, data models, APIs; implementation could begin from doc
            - value: partial
              label: Partial
              criteria:
                - Some technical detail but gaps remain
            - value: fail
              label: Fail
              criteria:
                - High-level only; would require significant design work to implement
    - id: cross_cutting_concerns
      name: Cross-Cutting Concerns
      description: Whether scalability, reliability, security, observability are addressed
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - All cross-cutting concerns systematically addressed with specific requirements
            - value: partial
              label: Partial
              criteria:
                - Some concerns addressed but coverage incomplete
            - value: fail
              label: Fail
              criteria:
                - Cross-cutting concerns ignored
    - id: implementation_plan
      name: Implementation Plan
      description: Whether there's a clear path from design to production
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Phased implementation with milestones, migration strategy, rollback plan
            - value: partial
              label: Partial
              criteria:
                - Some implementation thinking but not comprehensive
            - value: fail
              label: Fail
              criteria:
                - No implementation plan
    - id: open_questions
      name: Open Questions
      description: Whether unknowns are honestly acknowledged
      weight: 0.05
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Open questions explicitly listed with owners and due dates
            - value: partial
              label: Partial
              criteria:
                - Some questions acknowledged
            - value: fail
              label: Fail
              criteria:
                - No acknowledgment of unknowns; overconfident
