id: uxd-rubric
name: Google Experiment Plan Evaluation
version: "1.0"
description: Evaluates experiment plans for statistical rigor, clear hypotheses, and actionable design
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 0
        medium: 0
        low: -1
categories:
    - id: hypothesis_clarity
      name: Hypothesis Clarity
      description: Whether hypothesis is specific, testable, and actionable
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Hypothesis in If/Then/Because format; specific predictions; clear causal reasoning
            - value: partial
              label: Partial
              criteria:
                - Hypothesis exists but vague or not specific about expected magnitude
            - value: fail
              label: Fail
              criteria:
                - No clear hypothesis; 'let's see what happens' approach
    - id: success_criteria_predefined
      name: Pre-Defined Success Criteria
      description: Whether success criteria are defined before experiment runs
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Success criteria defined with minimum/target/stretch; decision framework explicit
            - value: partial
              label: Partial
              criteria:
                - Some criteria but not comprehensive
            - value: fail
              label: Fail
              criteria:
                - No pre-defined criteria; goalposts could be moved
    - id: statistical_rigor
      name: Statistical Rigor
      description: Whether experiment is properly powered with valid analysis plan
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Power analysis complete; sample size justified; statistical methods appropriate
            - value: partial
              label: Partial
              criteria:
                - Some statistical thinking but gaps
            - value: fail
              label: Fail
              criteria:
                - No statistical rigor; would produce unreliable results
    - id: metrics_design
      name: Metrics Design
      description: Whether primary, secondary, and guardrail metrics are appropriate
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Primary metric well-chosen; guardrails protect against harm; counter-metrics catch unintended effects
            - value: partial
              label: Partial
              criteria:
                - Some metrics but guardrails weak
            - value: fail
              label: Fail
              criteria:
                - Poor metric choice; would measure wrong thing or miss harms
    - id: implementation_plan
      name: Implementation Plan
      description: Whether rollout, monitoring, and stopping criteria are defined
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Phased rollout with gates; monitoring plan; stopping criteria explicit
            - value: partial
              label: Partial
              criteria:
                - Some implementation thinking
            - value: fail
              label: Fail
              criteria:
                - No rollout plan; would be all-or-nothing
    - id: analysis_plan
      name: Analysis Plan
      description: Whether analysis approach is defined in advance
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Pre-analysis checks defined; segmentation planned; interpretation guidelines set
            - value: partial
              label: Partial
              criteria:
                - Some analysis planning
            - value: fail
              label: Fail
              criteria:
                - No analysis plan; would be ad-hoc interpretation
    - id: risk_mitigation
      name: Risk Mitigation
      description: Whether risks are identified with mitigations
      weight: 0.05
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Risks identified; stopping criteria would catch problems; rollback plan exists
            - value: partial
              label: Partial
              criteria:
                - Some risk awareness
            - value: fail
              label: Fail
              criteria:
                - Risks not considered
