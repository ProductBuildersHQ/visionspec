id: mrd-rubric
name: JTBD Job Definition Evaluation
version: "1.0"
description: Evaluates MRD documents for job clarity, outcome focus, and forces of progress understanding
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 0
        medium: 0
        low: -1
categories:
    - id: job_clarity
      name: Job Clarity
      description: Whether the job is clearly defined in circumstance-based terms
      weight: 0.25
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Job stated in When/I want to/So I can format; circumstance-specific; stable over time
            - value: partial
              label: Partial
              criteria:
                - Job described but circumstance unclear or too broad
            - value: fail
              label: Fail
              criteria:
                - No clear job; describes product features not customer progress
    - id: job_dimensions
      name: Job Dimensions
      description: Whether functional, emotional, and social dimensions are addressed
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - All three dimensions (functional, emotional, social) clearly articulated
            - value: partial
              label: Partial
              criteria:
                - Functional covered but emotional/social weak
            - value: fail
              label: Fail
              criteria:
                - Only functional dimension; ignores emotional/social drivers
    - id: struggling_moments
      name: Struggling Moments
      description: Whether current struggles and workarounds are identified
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Specific struggles identified with evidence; workarounds documented with insights
            - value: partial
              label: Partial
              criteria:
                - Some struggles mentioned but not specific or evidenced
            - value: fail
              label: Fail
              criteria:
                - No struggle analysis; assumes job is unmet without evidence
    - id: forces_of_progress
      name: Forces of Progress
      description: Whether push, pull, anxiety, and habit forces are understood
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - All four forces clearly articulated with evidence for each
            - value: partial
              label: Partial
              criteria:
                - Some forces covered but not all; analysis feels incomplete
            - value: fail
              label: Fail
              criteria:
                - Forces not analyzed; doesn't understand switching dynamics
    - id: outcomes_specificity
      name: Outcomes Specificity
      description: Whether outcomes are specific and measurable
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Outcomes in proper format (direction + metric + object); importance/satisfaction rated
            - value: partial
              label: Partial
              criteria:
                - Outcomes listed but not in measurable format
            - value: fail
              label: Fail
              criteria:
                - No outcomes; focuses on features not outcomes
    - id: market_by_job
      name: Market by Job
      description: Whether market is sized by job rather than demographics
      weight: 0.1
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Market sized by job frequency and value; job executors defined by circumstance
            - value: partial
              label: Partial
              criteria:
                - Some job-based sizing but falls back to demographics
            - value: fail
              label: Fail
              criteria:
                - Traditional demographic segmentation; no job-based analysis
