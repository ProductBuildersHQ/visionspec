# 0-1 Experiment Evaluation Rubric

spec_type: experiment
name: "0-1 Experiment Rubric"
description: "Experiment card evaluation for hypothesis validation"
version: "1.0"

categories:
  - id: hypothesis_clarity
    name: "Hypothesis Clarity"
    description: "Hypothesis is clear, specific, and testable"
    weight: 0.25
    required: true
    criteria:
      pass: "Clear hypothesis with measurable success criteria"
      partial: "Hypothesis present but vague or unmeasurable"
      fail: "No clear hypothesis"

  - id: assumption_focus
    name: "Assumption Focus"
    description: "Experiment tests a critical assumption"
    weight: 0.20
    required: true
    criteria:
      pass: "Tests riskiest or critical path assumption"
      partial: "Tests an assumption but not the riskiest"
      fail: "Unclear what assumption is being tested"

  - id: experiment_design
    name: "Experiment Design"
    description: "Method is appropriate and executable"
    weight: 0.20
    required: true
    criteria:
      pass: "Clear method with sample size and timeline"
      partial: "Method described but missing details"
      fail: "No clear method"

  - id: success_criteria
    name: "Success Criteria"
    description: "Clear pass/fail criteria defined upfront"
    weight: 0.20
    required: true
    criteria:
      pass: "Specific numeric criteria for pass/fail"
      partial: "Criteria present but subjective"
      fail: "No success criteria"

  - id: learning_orientation
    name: "Learning Orientation"
    description: "Focused on learning, not just validation"
    weight: 0.10
    required: true
    criteria:
      pass: "Learning goals defined beyond just pass/fail"
      partial: "Some learning orientation"
      fail: "Only focused on proving hypothesis right"

  - id: resource_efficiency
    name: "Resource Efficiency"
    description: "Experiment is appropriately scoped"
    weight: 0.05
    required: false
    criteria:
      pass: "Minimum viable experiment to get signal"
      partial: "Somewhat over-scoped"
      fail: "Over-engineered for the question"

pass_criteria:
  require_all_pass: false
  max_critical: 0
  max_high: 1
  max_medium: 2
