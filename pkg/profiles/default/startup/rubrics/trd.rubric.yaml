id: trd-rubric
name: Startup TRD Rubric
version: "1.0"
description: Technical Requirements Document evaluation for pre-PMF startups
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 1
        medium: 2
        low: -1
categories:
    - id: architecture
      name: Architecture
      description: Basic system architecture defined
      weight: 0.25
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear architecture with technology choices justified
            - value: partial
              label: Partial
              criteria:
                - Architecture present but choices unclear
            - value: fail
              label: Fail
              criteria:
                - No architecture defined
    - id: data_model
      name: Data Model
      description: Core data entities defined
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Core entities defined with key fields
            - value: partial
              label: Partial
              criteria:
                - Some data model but incomplete
            - value: fail
              label: Fail
              criteria:
                - No data model
    - id: mvp_scope
      name: MVP Scope
      description: Clear technical MVP boundaries
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear must-build vs cut-for-MVP distinction
            - value: partial
              label: Partial
              criteria:
                - Scope mentioned but unclear
            - value: fail
              label: Fail
              criteria:
                - No scope definition
    - id: deployment
      name: Deployment
      description: Basic deployment approach
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear deployment approach with environments
            - value: partial
              label: Partial
              criteria:
                - Deployment mentioned
            - value: fail
              label: Fail
              criteria:
                - No deployment plan
    - id: security_basics
      name: Security Basics
      description: Basic security considerations
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Basic security checklist addressed
            - value: partial
              label: Partial
              criteria:
                - Some security considerations
            - value: fail
              label: Fail
              criteria:
                - No security consideration
    - id: pragmatism
      name: Pragmatism
      description: Technical choices are pragmatic for startup
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Pragmatic choices that optimize for speed to market
            - value: partial
              label: Partial
              criteria:
                - Some over-engineering
            - value: fail
              label: Fail
              criteria:
                - Over-engineered for stage
