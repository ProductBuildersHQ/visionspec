id: prd-rubric
name: Startup PRD Rubric
version: "1.0"
description: Lightweight PRD evaluation for pre-PMF startups. Focus on shipping, not perfection.
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 1
        medium: 3
        low: -1
categories:
    - id: problem-clarity
      name: Problem Clarity
      description: Is the problem being solved clearly stated?
      weight: 2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Problem is clearly stated in 1-2 paragraphs with target user identified
            - value: partial
              label: Partial
              criteria:
                - Problem is mentioned but vague or target user unclear
            - value: fail
              label: Fail
              criteria:
                - No clear problem statement
    - id: solution-scope
      name: Solution & Scope
      description: Is it clear what you're building and what you're not?
      weight: 2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear solution with defined MVP scope and explicit out-of-scope items
            - value: partial
              label: Partial
              criteria:
                - Solution described but scope boundaries unclear
            - value: fail
              label: Fail
              criteria:
                - No clear solution or scope is unbounded
    - id: user-stories
      name: User Stories
      description: Are there testable user stories?
      weight: 1.5
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - At least one user story with clear acceptance criteria
            - value: partial
              label: Partial
              criteria:
                - User stories present but missing acceptance criteria
            - value: fail
              label: Fail
              criteria:
                - No user stories or acceptance criteria
    - id: success-metrics
      name: Success Metrics
      description: How will you know if it's working?
      weight: 1
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - At least one measurable success metric defined
            - value: partial
              label: Partial
              criteria:
                - Vague notion of success without measurable metrics
            - value: fail
              label: Fail
              criteria:
                - No success metrics
