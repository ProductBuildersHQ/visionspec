id: uxd-rubric
name: Startup UXD Rubric
version: "1.0"
description: User Experience Design evaluation for pre-PMF startups
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 1
        medium: 2
        low: -1
categories:
    - id: user_focus
      name: User Focus
      description: Clear understanding of target user
      weight: 0.3
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Target user clearly defined with specific pain point
            - value: partial
              label: Partial
              criteria:
                - User mentioned but needs more specificity
            - value: fail
              label: Fail
              criteria:
                - No clear target user
    - id: user_journey
      name: User Journey
      description: Current vs future state comparison
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear current pain and future improvement
            - value: partial
              label: Partial
              criteria:
                - Journey described but unclear improvement
            - value: fail
              label: Fail
              criteria:
                - No user journey
    - id: key_screens
      name: Key Screens
      description: Visual representation of MVP
      weight: 0.25
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Key screens with main interactions
            - value: partial
              label: Partial
              criteria:
                - Some screens but incomplete
            - value: fail
              label: Fail
              criteria:
                - No visual design
    - id: mvp_scope
      name: MVP Scope
      description: Clear MVP boundaries
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear must-have vs nice-to-have distinction
            - value: partial
              label: Partial
              criteria:
                - Scope mentioned but unclear
            - value: fail
              label: Fail
              criteria:
                - No scope definition
    - id: simplicity
      name: Simplicity
      description: Design is appropriately simple for MVP
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Minimal, focused design for core value
            - value: partial
              label: Partial
              criteria:
                - Somewhat complex for MVP stage
            - value: fail
              label: Fail
              criteria:
                - Over-designed for MVP
