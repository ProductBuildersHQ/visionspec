id: press-rubric
name: Press Release Evaluation (Essentials)
version: "1.0"
description: Simplified evaluation of Press Release documents using Amazon Working Backwards methodology. Core criteria only - focuses on customer problem and solution clarity.
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 1
        medium: 0
        low: -1
categories:
    - id: headline_impact
      name: Headline Impact
      description: Whether the headline clearly communicates the primary customer benefit
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Compelling headline with clear customer benefit
            - value: partial
              label: Partial
              criteria:
                - Headline present but benefit unclear
            - value: fail
              label: Fail
              criteria:
                - No clear headline or focuses on company rather than customer
    - id: customer_problem
      name: Customer Problem
      description: How well the customer problem is articulated
      weight: 0.3
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear problem description; reader can understand the pain
            - value: partial
              label: Partial
              criteria:
                - Problem stated but lacks specificity
            - value: fail
              label: Fail
              criteria:
                - No clear customer problem
    - id: solution_clarity
      name: Solution Clarity
      description: Whether the solution and benefits are clearly explained
      weight: 0.3
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear solution with concrete benefits stated in customer terms
            - value: partial
              label: Partial
              criteria:
                - Solution described but benefits vague or too technical
            - value: fail
              label: Fail
              criteria:
                - No clear solution articulated
    - id: call_to_action
      name: Call to Action
      description: Clarity of next steps
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear next steps and availability
            - value: partial
              label: Partial
              criteria:
                - CTA present but vague
            - value: fail
              label: Fail
              criteria:
                - No call to action
    - id: readability
      name: Readability
      description: Whether the press release is written in plain language
      weight: 0.1
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear, jargon-free prose
            - value: partial
              label: Partial
              criteria:
                - Somewhat technical but understandable
            - value: fail
              label: Fail
              criteria:
                - Incomprehensible to target audience
