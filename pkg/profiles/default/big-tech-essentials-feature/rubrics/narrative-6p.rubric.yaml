id: narrative-6p-rubric
name: 6-Pager Evaluation (Essentials)
version: "1.0"
description: Simplified evaluation of Amazon-style 6-pager narratives. Core criteria only - focuses on narrative quality and data support.
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 1
        medium: 0
        low: -1
categories:
    - id: narrative_quality
      name: Narrative Quality
      description: Whether the document tells a coherent story
      weight: 0.3
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear narrative arc; easy to follow from problem to solution
            - value: partial
              label: Partial
              criteria:
                - Story exists but lacks flow
            - value: fail
              label: Fail
              criteria:
                - Bullet points masquerading as narrative
    - id: customer_focus
      name: Customer Focus
      description: Whether the narrative centers on customer needs
      weight: 0.25
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Customer perspective central throughout
            - value: partial
              label: Partial
              criteria:
                - Some customer focus but mixed with internal concerns
            - value: fail
              label: Fail
              criteria:
                - Internally-focused narrative
    - id: data_support
      name: Data Support
      description: Whether claims are supported by data
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Key claims backed by data with sources cited
            - value: partial
              label: Partial
              criteria:
                - Some data but missing key evidence
            - value: fail
              label: Fail
              criteria:
                - No data support; assertions without evidence
    - id: alternatives_tradeoffs
      name: Alternatives and Tradeoffs
      description: Whether alternatives were considered (Google practice)
      weight: 0.15
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear alternatives considered with explicit tradeoffs
            - value: partial
              label: Partial
              criteria:
                - Some alternatives mentioned
            - value: fail
              label: Fail
              criteria:
                - No alternatives considered
    - id: length_format
      name: Length and Format
      description: Whether the document follows 6-pager format
      weight: 0.1
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - 6 pages or less; no slides; pure prose
            - value: partial
              label: Partial
              criteria:
                - Slightly over 6 pages or some bullet lists
            - value: fail
              label: Fail
              criteria:
                - Way too long or slide-like format
