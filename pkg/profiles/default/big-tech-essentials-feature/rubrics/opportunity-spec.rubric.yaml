name: "OpportunitySpec Evaluation (Essentials)"
description: "Simplified evaluation of OpportunitySpec (12-box canvas). Core criteria only - focuses on problem, opportunity, and business case."
pass_criteria:
  min_score: 6.5
  max_critical: 0
  max_high: 1

categories:
  - id: problem_clarity
    name: "Problem Clarity"
    description: "Whether the problem is clearly defined"
    weight: 0.25
    required: true
    criteria:
      pass: "Clear problem statement with evidence from customer research"
      partial: "Problem stated but lacks evidence"
      fail: "No clear problem; solution-first thinking"

  - id: opportunity_size
    name: "Opportunity Size"
    description: "Whether the opportunity is quantified"
    weight: 0.20
    required: true
    criteria:
      pass: "Clear quantification of opportunity size and impact"
      partial: "Some sizing but vague"
      fail: "No opportunity sizing"

  - id: user_value
    name: "User Value"
    description: "Whether user value is clearly articulated"
    weight: 0.20
    required: true
    criteria:
      pass: "Clear user benefits with evidence"
      partial: "User value claimed but not well supported"
      fail: "No clear user value proposition"

  - id: business_value
    name: "Business Value"
    description: "Whether business value is clearly articulated"
    weight: 0.15
    required: true
    criteria:
      pass: "Clear business case with metrics"
      partial: "Business value claimed but not quantified"
      fail: "No business case"

  - id: risks_assumptions
    name: "Risks and Assumptions"
    description: "Whether key risks and assumptions are identified"
    weight: 0.10
    required: false
    criteria:
      pass: "Key risks and assumptions identified with mitigation plans"
      partial: "Some risks mentioned"
      fail: "No risk analysis"

  - id: success_metrics
    name: "Success Metrics"
    description: "Whether OKRs or success metrics are defined"
    weight: 0.10
    required: true
    criteria:
      pass: "Clear OKRs with baselines and targets"
      partial: "Some metrics but lacking specificity"
      fail: "No success metrics"
