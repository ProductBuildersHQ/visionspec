id: prd-rubric
name: Stripe API Product Requirements Evaluation
version: "1.0"
description: Evaluates API PRDs for developer-centric thinking, use cases, and integration clarity
evaluationType: analytic
passCriteria:
    minCategoriesPassing: all_required
    maxFindingsSeverity:
        critical: 0
        high: 0
        medium: 0
        low: -1
categories:
    - id: developer_personas
      name: Developer Personas
      description: Whether developer audience is clearly defined
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear developer segments with distinct needs, complexity levels, and priorities
            - value: partial
              label: Partial
              criteria:
                - Some persona definition but not segmented by needs
            - value: fail
              label: Fail
              criteria:
                - Generic 'developers' without understanding different use cases
    - id: developer_journeys
      name: Developer Journeys
      description: Whether integration paths are mapped end-to-end
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear journeys from discovery to production; friction points identified; success metrics defined
            - value: partial
              label: Partial
              criteria:
                - Some journey thinking but gaps in the path
            - value: fail
              label: Fail
              criteria:
                - No journey mapping; would be unclear how developers succeed
    - id: use_case_clarity
      name: Use Case Clarity
      description: Whether use cases are specific and prioritized
      weight: 0.2
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Use cases are specific with clear priority; developer value articulated for each
            - value: partial
              label: Partial
              criteria:
                - Use cases listed but priority unclear
            - value: fail
              label: Fail
              criteria:
                - Vague use cases; unclear what developers would build
    - id: integration_patterns
      name: Integration Patterns
      description: Whether integration patterns are defined
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear patterns (sync, async, webhook) with guidance on when to use each
            - value: partial
              label: Partial
              criteria:
                - Some patterns mentioned but guidance missing
            - value: fail
              label: Fail
              criteria:
                - No integration patterns; developers would be guessing
    - id: error_experience
      name: Error Experience
      description: Whether error handling expectations are defined
      weight: 0.15
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Error handling requirements explicit; developer expectations defined; remediation required
            - value: partial
              label: Partial
              criteria:
                - Some error thinking but not systematic
            - value: fail
              label: Fail
              criteria:
                - Errors not considered from developer perspective
    - id: sdk_requirements
      name: SDK Requirements
      description: Whether SDK expectations are defined
      weight: 0.1
      required: true
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - SDK languages prioritized; SDK principles defined; feature matrix clear
            - value: partial
              label: Partial
              criteria:
                - SDK mentioned but requirements unclear
            - value: fail
              label: Fail
              criteria:
                - No SDK planning
    - id: success_metrics
      name: Success Metrics
      description: Whether developer success is measurable
      weight: 0.05
      scale:
        type: categorical
        options:
            - value: pass
              label: Pass
              criteria:
                - Clear metrics for developer acquisition, activation, and success
            - value: partial
              label: Partial
              criteria:
                - Some metrics but not comprehensive
            - value: fail
              label: Fail
              criteria:
                - No success metrics; would be unable to measure
