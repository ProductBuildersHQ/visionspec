name: "Stripe API Specification Evaluation"
description: "Evaluates API specifications for contract clarity, consistency, and developer usability"
pass_criteria:
  min_score: 7.0
  max_critical: 0
  max_high: 0

categories:
  - id: contract_clarity
    name: "Contract Clarity"
    description: "Whether API contracts are precise and unambiguous"
    weight: 0.25
    required: true
    criteria:
      pass: "Every endpoint has explicit inputs, outputs, and behavior; no ambiguity in types or semantics"
      partial: "Most endpoints clear but some edge cases undefined"
      fail: "Contracts are vague; would require guessing to implement"

  - id: consistency
    name: "API Consistency"
    description: "Whether patterns are predictable across the API surface"
    weight: 0.20
    required: true
    criteria:
      pass: "Consistent naming, response formats, error structures, and pagination across all endpoints"
      partial: "Mostly consistent but some exceptions"
      fail: "Inconsistent patterns; each endpoint feels different"

  - id: error_documentation
    name: "Error Documentation"
    description: "Whether errors are fully documented with remediation"
    weight: 0.20
    required: true
    criteria:
      pass: "Every error code documented with cause, meaning, and remediation steps"
      partial: "Errors listed but remediation unclear"
      fail: "Errors not documented; developers would be guessing"

  - id: resource_modeling
    name: "Resource Modeling"
    description: "Whether resources are well-designed with clear relationships"
    weight: 0.15
    required: true
    criteria:
      pass: "Resources are coherent entities; relationships explicit; CRUD operations appropriate"
      partial: "Resources defined but relationships unclear"
      fail: "Poor resource modeling; would be confusing to use"

  - id: versioning_strategy
    name: "Versioning Strategy"
    description: "Whether versioning and breaking changes are handled"
    weight: 0.10
    required: true
    criteria:
      pass: "Clear versioning scheme; breaking change policy defined; migration paths explicit"
      partial: "Versioning mentioned but policy unclear"
      fail: "No versioning strategy; breaking changes would surprise developers"

  - id: idempotency_safety
    name: "Idempotency and Safety"
    description: "Whether safe retry behavior is documented"
    weight: 0.05
    required: false
    criteria:
      pass: "Idempotency support documented; safe retry guidance provided"
      partial: "Some idempotency awareness"
      fail: "No idempotency consideration"

  - id: rate_limiting
    name: "Rate Limiting"
    description: "Whether rate limits are documented with handling guidance"
    weight: 0.05
    required: false
    criteria:
      pass: "Rate limits explicit; headers documented; retry guidance provided"
      partial: "Rate limits mentioned but incomplete"
      fail: "Rate limits not addressed"
